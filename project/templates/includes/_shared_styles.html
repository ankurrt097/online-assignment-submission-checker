<!-- Shared Sidebar CSS — include this in every <style> block -->
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        display: flex;
        background: #f1f5f9;
        min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
        width: 260px;
        min-height: 100vh;
        background: linear-gradient(180deg, #1e3a8a, #2563eb);
        padding: 0;
        color: white;
        position: fixed;
        top: 0;
        left: 0;
        display: flex;
        flex-direction: column;
        z-index: 100;
    }

    .sidebar-brand {
        padding: 28px 20px 22px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
    }

    .brand-avatar {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 700;
        border: 2px solid rgba(255, 255, 255, 0.5);
        margin-bottom: 4px;
    }

    .brand-name {
        font-size: 15px;
        font-weight: 600;
    }

    .brand-role {
        font-size: 11px;
        background: rgba(255, 255, 255, 0.2);
        padding: 2px 10px;
        border-radius: 20px;
        color: #bfdbfe;
    }

    .sidebar-nav {
        flex: 1;
        padding: 20px 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .nav-item {
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 14px;
        border-radius: 10px;
        transition: all 0.25s;
    }

    .nav-item i {
        width: 18px;
        text-align: center;
    }

    .nav-item:hover {
        background: rgba(255, 255, 255, 0.18);
        color: white;
        padding-left: 18px;
    }

    .nav-item.active {
        background: rgba(255, 255, 255, 0.25);
        color: white;
        font-weight: 600;
    }

    .sidebar-footer {
        padding: 16px 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .logout-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #fca5a5;
        text-decoration: none;
        font-size: 14px;
        padding: 10px 14px;
        border-radius: 10px;
        transition: 0.25s;
    }

    .logout-btn:hover {
        background: rgba(239, 68, 68, 0.2);
        color: #fca5a5;
    }

    /* ── Main Content ── */
    .main {
        margin-left: 260px;
        padding: 40px;
        flex: 1;
        width: calc(100% - 260px);
    }

    /* ── Header Card ── */
    .page-header {
        background: white;
        padding: 22px 28px;
        border-radius: 14px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        margin-bottom: 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .page-header h1 {
        color: #1e3a8a;
        font-weight: 600;
        font-size: 21px;
    }

    .page-header p {
        color: #64748b;
        font-size: 13px;
        margin-top: 3px;
    }

    /* ── Stat Cards ── */
    .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 22px;
    }

    .stat-card {
        background: white;
        padding: 24px;
        border-radius: 14px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        display: flex;
        align-items: center;
        gap: 20px;
        transition: 0.3s;
        border: 1px solid #f1f5f9;
        text-decoration: none;
    }

    .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    .stat-icon {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
    }

    .stat-info h3 {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 2px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .stat-info p {
        font-size: 26px;
        font-weight: 700;
        color: #1e293b;
    }

    /* ── Buttons ── */
    .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 10px 20px;
        background: linear-gradient(135deg, #2563eb, #1e40af);
        color: white;
        text-decoration: none;
        border-radius: 9px;
        font-size: 14px;
        font-weight: 500;
        border: none;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-primary:hover {
        transform: scale(1.04);
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
    }

    .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 10px 20px;
        background: #f1f5f9;
        color: #374151;
        text-decoration: none;
        border-radius: 9px;
        font-size: 14px;
        font-weight: 500;
        border: none;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-secondary:hover {
        background: #e2e8f0;
    }

    .btn-danger {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        background: #fee2e2;
        color: #b91c1c;
        text-decoration: none;
        border-radius: 9px;
        font-size: 13px;
        font-weight: 500;
        border: none;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-danger:hover {
        background: #fecaca;
    }

    /* ── White Cards ── */
    .card {
        background: white;
        border-radius: 14px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        overflow: hidden;
    }

    .card-body {
        padding: 28px;
    }

    /* ── Tables ── */
    table {
        width: 100%;
        border-collapse: collapse;
    }

    th {
        background: linear-gradient(135deg, #1e3a8a, #2563eb);
        color: white;
        padding: 13px 16px;
        text-align: left;
        font-weight: 500;
    }

    td {
        padding: 13px 16px;
        border-bottom: 1px solid #f1f5f9;
        color: #374151;
    }

    tr:last-child td {
        border-bottom: none;
    }

    tr:hover td {
        background: #f8fafc;
    }

    /* ── Forms ── */
    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 7px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
        width: 100%;
        padding: 11px 14px;
        border: 2px solid #e2e8f0;
        border-radius: 9px;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        color: #374151;
        transition: 0.3s;
        background: #f8fafc;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        border-color: #2563eb;
        outline: none;
        background: white;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* ── Messages ── */
    .alert {
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 14px;
        margin-bottom: 16px;
    }

    .alert-error {
        background: #fef2f2;
        color: #b91c1c;
        border-left: 4px solid #ef4444;
    }

    .alert-success {
        background: #f0fdf4;
        color: #166534;
        border-left: 4px solid #22c55e;
    }

    /* ── Empty State ── */
    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #94a3b8;
    }

    .empty-state i {
        font-size: 50px;
        margin-bottom: 14px;
        display: block;
    }

    .empty-state p {
        font-size: 15px;
    }

    /* ── Back Button ── */
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 22px;
        padding: 9px 18px;
        background: white;
        color: #374151;
        text-decoration: none;
        border-radius: 9px;
        font-size: 13px;
        font-weight: 500;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        transition: 0.3s;
    }

    .back-btn:hover {
        background: #f1f5f9;
    }

    @media(max-width:768px) {
        .sidebar {
            display: none;
        }

        .main {
            margin-left: 0;
            width: 100%;
        }
    }
</style>
