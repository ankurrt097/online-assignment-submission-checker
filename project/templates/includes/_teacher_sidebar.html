<!-- Teacher Sidebar Include -->
<div class="sidebar">
    <div class="sidebar-brand">
        {% if request.user.teacherprofile.profile_pic %}
        <img src="{{ request.user.teacherprofile.profile_pic.url }}" class="brand-avatar" style="object-fit: cover;">
        {% else %}
        <div class="brand-avatar">{{ request.user.username|first|upper }}</div>
        {% endif %}
        <span class="brand-name">{{ request.user.username }}</span>
        <span class="brand-role">Teacher</span>
    </div>

    <nav class="sidebar-nav">
        <a href="{% url 'teacher_dashboard' %}"
            class="nav-item {% if request.resolver_match.url_name == 'teacher_dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i> <span>Dashboard</span>
        </a>
        <a href="{% url 'teacher_profile' %}"
            class="nav-item {% if request.resolver_match.url_name == 'teacher_profile' %}active{% endif %}">
            <i class="fas fa-user-circle"></i> <span>My Profile</span>
        </a>
        <a href="{% url 'teacher_semesters' %}"
            class="nav-item {% if request.resolver_match.url_name == 'teacher_semesters' or request.resolver_match.url_name == 'semester_detail' %}active{% endif %}">
            <i class="fas fa-chalkboard"></i> <span>My Semesters</span>
        </a>
        <a href="{% url 'create_assignment' %}"
            class="nav-item {% if request.resolver_match.url_name == 'create_assignment' %}active{% endif %}">
            <i class="fas fa-plus-circle"></i> <span>Create Assignment</span>
        </a>
        <a href="{% url 'teacher_assignments' %}"
            class="nav-item {% if request.resolver_match.url_name == 'teacher_assignments' %}active{% endif %}">
            <i class="fas fa-tasks"></i> <span>My Assignments</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <a href="{% url 'logout' %}" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>
