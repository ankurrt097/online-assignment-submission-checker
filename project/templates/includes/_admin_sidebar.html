<!-- Admin Sidebar Include -->
<div class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-avatar">A</div>
        <span class="brand-name">Admin</span>
        <span class="brand-role">System Admin</span>
    </div>

    <nav class="sidebar-nav">
        <a href="{% url 'admin_dashboard' %}"
            class="nav-item {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i> <span>Dashboard</span>
        </a>
        <a href="{% url 'create_teacher' %}"
            class="nav-item {% if request.resolver_match.url_name == 'create_teacher' %}active{% endif %}">
            <i class="fas fa-plus-circle"></i> <span>Create Teacher</span>
        </a>
        <a href="{% url 'teacher_list' %}"
            class="nav-item {% if request.resolver_match.url_name == 'teacher_list' %}active{% endif %}">
            <i class="fas fa-chalkboard-teacher"></i> <span>View Teachers</span>
        </a>


        <a href="{% url 'create_student' %}"
            class="nav-item {% if request.resolver_match.url_name == 'create_student' %}active{% endif %}">
            <i class="fas fa-plus-circle"></i> <span>Create Student</span>
        </a>

        <a href="{% url 'view_classes' %}"
            class="nav-item {% if request.resolver_match.url_name == 'view_classes' %}active{% endif %}">
            <i class="fas fa-users"></i> <span>View Students</span>
        </a>


        <a href="{% url 'create_course' %}"
            class="nav-item {% if request.resolver_match.url_name == 'create_course' %}active{% endif %}">
            <i class="fas fa-folder-plus"></i> <span>Create Course</span>
        </a>
        <a href="{% url 'admin_course_list' %}"
            class="nav-item {% if request.resolver_match.url_name == 'admin_course_list' %}active{% endif %}">
            <i class="fas fa-university"></i> <span>View Courses</span>
        </a>
        <a href="{% url 'create_subject' %}"
            class="nav-item {% if request.resolver_match.url_name == 'create_subject' %}active{% endif %}">
            <i class="fas fa-plus-circle"></i> <span>Create Subject</span>
        </a>
        <a href="{% url 'admin_subjects' %}"
            class="nav-item {% if request.resolver_match.url_name == 'admin_subjects' %}active{% endif %}">
            <i class="fas fa-book"></i> <span>View Subjects</span>
        </a>

    </nav>

    <div class="sidebar-footer">
        <a href="{% url 'logout' %}" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>
