<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Assignment - Teacher Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include 'includes/_shared_styles.html' %}
    <script src="https://kit.fontawesome.com/7a4b62b0a4.js" crossorigin="anonymous"></script>
</head>

<body>
    {% include 'includes/_teacher_sidebar.html' %}
    <div class="main">
        <a href="{% url 'teacher_assignments' %}" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Assignments
        </a>
        <div class="page-header">
            <div>
                <h1><i class="fas fa-edit"></i> Edit Assignment</h1>
                <p>Modify the details, deadline, or requirements of your assignment.</p>
            </div>
        </div>
        <div class="card" style="max-width: 700px;">
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Assignment Title</label>
                        <input type="text" name="title" value="{{ assignment.title }}" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" rows="5" required>{{ assignment.description }}</textarea>
                    </div>
                    <div class="form-group">
                        <label>Select Subject</label>
                        <select name="subject_id" required>
                            {% for s in subjects %}
                            <option value="{{ s.id }}" {% if s.is_selected %} selected {% endif %}>
                                {{ s.name }} - {{ s.classroom.name }} (Sem {{ s.classroom.semester }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Deadline Date</label>
                            <input type="date" name="deadline" value="{{ assignment.deadline|date:'Y-m-d' }}" required>
                        </div>
                        <div class="form-group">
                            <label>Update File (Optional)</label>
                            <input type="file" name="file">
                        </div>
                    </div>
                    <div style="display: flex; gap: 12px; margin-top: 30px;">
                        <button type="submit" class="btn-primary" style="flex: 1; justify-content: center;">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <a href="{% url 'teacher_assignments' %}" class="btn-secondary"
                            style="flex: 1; justify-content: center;">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
