<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/7a4b62b0a4.js" crossorigin="anonymous"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f172a,#020617);
overflow:hidden;
color:#fff;
}

/* floating background */

.bg-blobs{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.blob{
position:absolute;
width:320px;
height:320px;
border-radius:50%;
filter:blur(70px);
opacity:.35;
background:radial-gradient(circle,#3b82f6,transparent 70%);
animation:move 25s infinite alternate;
}

.blob:nth-child(2){
background:radial-gradient(circle,#8b5cf6,transparent 70%);
left:40%;
animation-duration:28s;
}

.blob:nth-child(3){
background:radial-gradient(circle,#ec4899,transparent 70%);
right:-50px;
bottom:-50px;
animation-duration:30s;
}

@keyframes move{
from{transform:translate(-50px,-50px)}
to{transform:translate(200px,200px)}
}

/* card */

.card{
position:relative;
z-index:10;
width:420px;
padding:45px 35px;
border-radius:26px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 30px 60px rgba(0,0,0,.6);
animation:fade .7s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(25px)}
to{opacity:1;transform:translateY(0)}
}

.header{
text-align:center;
margin-bottom:35px;
}

.icon{
width:65px;
height:65px;
margin:auto;
border-radius:18px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
box-shadow:0 10px 25px rgba(37,99,235,.45);
margin-bottom:15px;
}

h2{
font-weight:600;
}

p.subtitle{
font-size:14px;
color:#94a3b8;
margin-top:6px;
}

/* input */

.form-group{
margin-top:20px;
}

.input-box{
position:relative;
}

.input-box i{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
color:#64748b;
}

input{
width:100%;
padding:14px 20px 14px 45px;
border-radius:14px;
border:2px solid rgba(255,255,255,.05);
background:rgba(15,23,42,.6);
color:white;
font-size:14px;
transition:.3s;
}

input:focus{
outline:none;
border-color:#3b82f6;
background:rgba(15,23,42,.9);
box-shadow:0 0 0 3px rgba(59,130,246,.2);
}

/* button */

button{
width:100%;
margin-top:20px;
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 20px rgba(37,99,235,.35);
}

button:hover{
transform:translateY(-2px);
box-shadow:0 18px 30px rgba(37,99,235,.55);
}

/* error */

.error{
background:rgba(239,68,68,.15);
border:1px solid rgba(239,68,68,.3);
padding:12px;
border-radius:12px;
margin-top:15px;
font-size:13px;
color:#fca5a5;
text-align:center;
}

/* link */

.back{
margin-top:20px;
text-align:center;
font-size:13px;
color:#94a3b8;
}

.back a{
color:#3b82f6;
text-decoration:none;
font-weight:500;
}

.back a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="bg-blobs">
<div class="blob"></div>
<div class="blob"></div>
<div class="blob"></div>
</div>

<div class="card">

<div class="header">
<div class="icon">
<i class="fas fa-key"></i>
</div>

<h2>Forgot Password</h2>
<p class="subtitle">Enter your email to receive OTP</p>
</div>

{% if error %}
<div class="error">
<i class="fas fa-exclamation-circle"></i>
{{ error }}
</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="form-group">
<div class="input-box">
<input type="email" name="email" placeholder="Enter your email" required>
<i class="fas fa-envelope"></i>
</div>
</div>

<button type="submit">
Send OTP
</button>

</form>

<div class="back">
Remember your password? 
<a href="{% url 'login' %}">Back to login</a>
</div>

</div>

</body>
</html>
