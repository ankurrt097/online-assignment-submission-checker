<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login - College Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/7a4b62b0a4.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #020617);
            overflow: hidden;
            color: #f8fafc;
        }

        /* floating blobs background */

        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .blob {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            filter: blur(60px);
            opacity: .35;
            background: radial-gradient(circle, #3b82f6, transparent 70%);
            animation: move 25s infinite alternate;
        }

        .blob:nth-child(2) {
            background: radial-gradient(circle, #8b5cf6, transparent 70%);
            left: 40%;
            animation-duration: 28s;
        }

        .blob:nth-child(3) {
            background: radial-gradient(circle, #ec4899, transparent 70%);
            right: -50px;
            bottom: -50px;
            animation-duration: 32s;
        }

        @keyframes move {
            from {
                transform: translate(-50px, -50px)
            }

            to {
                transform: translate(200px, 200px)
            }
        }

        /* login card */

        .login-card {
            position: relative;
            z-index: 5;
            width: 420px;
            padding: 50px 40px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, .6);
            animation: fadeIn .8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* header */

        .card-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            margin: auto;
            border-radius: 18px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 12px 25px rgba(37, 99, 235, .45);
            margin-bottom: 15px;
        }

        h2 {
            font-weight: 600;
            letter-spacing: -.4px;
        }

        /* form */

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .input-container {
            position: relative;
        }

        .input-container i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: rgba(15, 23, 42, .6);
            border: 2px solid rgba(255, 255, 255, .05);
            border-radius: 14px;
            color: white;
            font-size: 14px;
            transition: .3s;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(15, 23, 42, .9);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .2);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 12px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: .3s;
            box-shadow: 0 10px 20px rgba(37, 99, 235, .35);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(37, 99, 235, .55);
        }

        .alert {
            background: rgba(239, 68, 68, .15);
            border: 1px solid rgba(239, 68, 68, .3);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #fca5a5;
            text-align: center;
        }


        .footer-links {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
        }

        .footer-links a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="bg-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="login-card">

        <div class="card-header">
            <div class="icon-box">
                <i class="fas fa-graduation-cap"></i>
            </div>

            <h2>Welcome Back</h2>
            <p style="color:#94a3b8;font-size:14px;">Log in to access your portal</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert">
            <i class="fas fa-exclamation-circle"></i>
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <div class="input-container">
                    <input type="text" name="username" placeholder="Your username" required>
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-container">
                    <input type="password" name="password" placeholder="••••••••" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit">Log in</button>

        </form>

        <div class="footer-links">


            <p>
                <a href="{% url 'forgot_password' %}">Forgot Password?</a>
            </p>

            <p style="margin-top:8px;">
                ⚙ Administrator? <a href="{% url 'admin_login' %}">Admin Login</a>
            </p>

        </div>

    </div>

</body>

</html>
