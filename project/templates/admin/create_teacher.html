<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Teacher</title>
    {% include 'includes/_shared_styles.html' %}
</head>

<body>

    {% include 'includes/_admin_sidebar.html' %}

    <div class="main">
        <div class="page-header">
            <div>
                <h1>👨‍🏫 Add New Teacher</h1>
                <p>Register a new teacher account in the system.</p>
            </div>
        </div>

        <div class="card" style="max-width: 500px;">
            <div class="card-body">
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-error">{{ message }}</div>
                {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" placeholder="Enter username" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="Enter email" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">
                        <i class="fas fa-user-plus"></i> Create Teacher Account
                    </button>
                </form>
            </div>
        </div>

        <a href="{% url 'admin_dashboard' %}" class="back-btn" style="margin-top: 20px;">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>

    </div>

</body>

</html>
