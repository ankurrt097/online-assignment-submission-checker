<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Edit Subject</title>
    {% include 'includes/_shared_styles.html' %}
</head>
<body>
    {% include 'includes/_admin_sidebar.html' %}
    <div class="main">
        <div class="page-header">
            <div>
                <h1>📚 Edit Subject</h1>
                <p>Update subject details and teacher assignment.</p>
            </div>
        </div>
        <div class="card" style="max-width: 600px;">
            <div class="card-body">
                {% if messages %}
                {% for message in messages %}
                <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Subject Name</label>
                        <input type="text" name="name" value="{{ subject.name }}" placeholder="e.g. Mathematics" required>
                    </div>
                    <div class="form-group">
                        <label>Select Classroom</label>
                        <select name="classroom_id" required>
                            {% for classroom in classrooms %}
                            <option value="{{ classroom.id }}" {% if classroom.id == subject.classroom.id %}selected{% endif %}>{{ classroom.name }} (Semester {{ classroom.semester }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Assign Teacher</label>
                        <select name="teacher_id" required>
                            {% for teacher in teachers %}
                            <option value="{{ teacher.id }}" {% if teacher.id == subject.teacher.id %}selected{% endif %}>{{ teacher.username }} ({{ teacher.email }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; background: #8b5cf6; border-color: #8b5cf6;">Update Subject</button>
                </form>
            </div>
        </div>
        <div style="margin-top: 20px;">
            <a href="{% url 'admin_subjects' %}" class="back-btn"> Back to Subjects</a>
        </div>
    </div>
</body>
</html>
