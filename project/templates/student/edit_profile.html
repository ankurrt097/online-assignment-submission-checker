<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    {% include 'includes/_shared_styles.html' %}
    <script src="https://kit.fontawesome.com/7a4b62b0a4.js" crossorigin="anonymous"></script>
</head>

<body>

    {% include 'includes/_student_sidebar.html' %}

    <div class="main">
        <a href="{% url 'student_profile' %}" class="back-btn">⬅ Back to Profile</a>

        <div class="page-header">
            <div>
                <h1>✏ Edit Profile</h1>
                <p>Update your personal information and profile settings.</p>
            </div>
        </div>

        <div class="card" style="max-width: 600px;">
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Profile Picture</label>
                        <input type="file" name="profile_pic" accept="image/*">
                    </div>

                    <div class="form-group">
                        <label>Enrollment Number</label>
                        <input type="text" name="enrollment_no" value="{{ profile.enrollment_no }}"
                            placeholder="Enter your enrollment ID" required>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" name="phone" value="{{ profile.phone }}" placeholder="+91 XXXXXXXXXX"
                            required>
                    </div>

                    <div class="form-group">
                        <label>Bio</label>
                        <textarea name="bio" rows="4"
                            placeholder="Tell us about yourself...">{{ profile.bio }}</textarea>
                    </div>

                    <div class="form-group">
                        <label>Enrollment Info</label>
                        <div
                            style="padding: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; color: #475569; font-size: 14px;">
                            <strong>Course:</strong> {{ profile.course.name }}<br>
                            <strong>Semester:</strong> Sem {{ profile.semester.semester_number }}
                        </div>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 30px;">
                        <button type="submit" class="btn-primary" style="flex: 1; justify-content: center;">Save
                            Changes</button>
                        <a href="{% url 'student_profile' %}" class="btn-secondary"
                            style="flex: 1; justify-content: center;">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
